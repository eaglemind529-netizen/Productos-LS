<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODUCTOS LS | Mi Cuenta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">

    <!-- Pantalla de Login (Oculta por defecto si hay sesión) -->
    <div id="loginSection" class="min-h-screen flex flex-col items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-xl text-center">
            <div class="w-16 h-16 bg-black rounded-2xl mx-auto flex items-center justify-center text-white font-black text-2xl italic mb-6">LS</div>
            <h1 class="text-2xl font-black uppercase tracking-tighter mb-2 italic">Bienvenido</h1>
            <p class="text-gray-500 text-sm mb-8">Inicia sesión para gestionar tus pedidos y cuotas.</p>
            <button id="loginBtn" class="w-full bg-black text-white py-4 rounded-xl font-black uppercase text-sm tracking-widest">
                Acceder con Google
            </button>
        </div>
    </div>

    <!-- Panel del Cliente (Oculto hasta que logueen) -->
    <div id="dashboardSection" class="p-6 hidden">
        <header class="flex justify-between items-center mb-8">
            <h2 class="font-black text-xl italic uppercase">Mi Perfil</h2>
            <button id="logoutBtn" class="text-xs font-bold underline">Salir</button>
        </header>

        <div class="bg-black text-white p-6 rounded-3xl mb-6 shadow-2xl">
            <p class="text-xs font-bold uppercase opacity-70 mb-1">Deuda pendiente</p>
            <h1 class="text-4xl font-black italic">$450.00</h1>
            <div class="mt-4 flex gap-2 text-[10px] font-bold uppercase bg-white/10 p-2 rounded-lg inline-flex">
                <span>Próximo pago: 20 de Julio</span>
            </div>
        </div>

        <a href="catalogo.html" class="block w-full bg-white border border-gray-200 p-6 rounded-3xl text-center font-black uppercase text-sm tracking-widest hover:border-black transition">
            Ver Catálogo de Perfumes
        </a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
            } else {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('dashboardSection').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
